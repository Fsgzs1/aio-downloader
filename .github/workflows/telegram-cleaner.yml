name: telegram-cleaner-manual

on:
  workflow_dispatch:   # only manual trigger

jobs:
  clean:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install jdatetime   # kept in case you need jdatetime later, though not used here

      - name: Clean Telegram media & archive
        run: |
          python << 'EOF'
          import shutil
          from pathlib import Path

          content_dir = Path("telegram/content")
          md_file = Path("telegram.md")

          if content_dir.exists():
              shutil.rmtree(content_dir)
              print("🧹 Deleted telegram/content/")
          else:
              print("ℹ️ telegram/content/ not found, nothing to delete")

          if md_file.exists():
              md_file.unlink()
              print("🧹 Deleted telegram.md")
          else:
              print("ℹ️ telegram.md not found, nothing to delete")
          EOF

      - name: Commit and push deletions
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config http.postBuffer 524288000

          # Stage the deletions (if the files/dirs were previously tracked)
          git add telegram/content/ telegram.md

          if git diff --staged --quiet; then
            echo "No changes to commit (nothing was deleted)."
            exit 0
          fi

          git commit -m "🧹 Clean Telegram media & archive (manual trigger) [skip ci]"

          RETRIES=5
          for i in $(seq 1 $RETRIES); do
            echo "Push attempt $i..."
            git pull --rebase --autostash origin "$BRANCH"
            if git push origin "$BRANCH"; then
              echo "Push succeeded."
              break
            else
              echo "Push failed."
              [ $i -lt $RETRIES ] && sleep 3 || exit 1
            fi
          done
